name: sicklecare_app
description: "SickleCare - Sickle Cell Health Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  #  UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  font_awesome_flutter: ^11.0.0

  #  for sharing 

  printing: ^5.12.0
  pdf: ^3.10.8


  #  Charts & Data
  fl_chart: ^0.68.0
  intl: ^0.19.0
  path_provider: ^2.1.2
  share_plus: ^7.2.1

  #  Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.8.1
  cloud_firestore: ^4.17.5

  #  API & Location
  http: ^1.2.0
  geolocator: ^14.0.2
  url_launcher: ^6.3.2

  #  State Management
  provider: ^6.1.5

  #  Local Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.2

  #  Notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

  #  ENV (API keys)
  flutter_dotenv: ^6.0.0

  #  Debugging
  logger: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  #  App icon generator
  flutter_launcher_icons: ^0.13.1

#  App Icon Config
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true

  #  ASSETS (VERY IMPORTANT FOR DOTENV)
  assets:
    - .env
    - assets/
name: sicklecare_app
description: "SickleCare - Sickle Cell Health Management App"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.7.0
  animate_do: ^3.3.9

  # Voice / Media
  speech_to_text: 7.4.0
  flutter_tts: ^4.2.5
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.68.0
  intl: ^0.19.0

  # State Management
  provider: ^6.1.5

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.3.1

  # File / Sharing
  path_provider: ^2.1.5
  share_plus: ^7.2.2
  printing: ^5.13.1
  pdf: ^3.10.8

  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.17.5
  cloud_functions: ^4.7.6

  # Networking
  http: ^1.2.0
  connectivity_plus: ^6.1.5
  geolocator: ^10.1.1
  url_launcher: ^6.3.2

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.1

  # ENV
  flutter_dotenv: ^5.2.1

  # Utils
  logger: ^1.4.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/AppIcon.png"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/